<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat IA - OpenAI</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <div class="max-w-2xl mx-auto w-full p-4 flex flex-col flex-1">
    <h1 class="text-2xl font-bold mb-4 text-center">Chat IA (OpenAI)</h1>
    <div class="mb-4 flex flex-col md:flex-row gap-2 items-center justify-between">
      <input id="openai-key" type="password" placeholder="Clé OpenAI" class="border rounded px-3 py-2 flex-1" />
      <select id="model-select" class="border rounded px-3 py-2 ml-0 md:ml-2">
        <option value="gpt-4.1-nano">gpt-4.1-nano</option>
        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
        <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
      </select>
      <button id="save-key" class="bg-blue-500 text-white px-4 py-2 rounded ml-0 md:ml-2">Sauver clé</button>
    </div>
    <div id="chat-window" class="bg-white rounded shadow p-4 mb-4 h-96 overflow-y-auto flex flex-col gap-2"></div>
    <div id="cost-info" class="text-sm text-gray-500 mb-2 text-right"></div>
    <div id="total-cost-info" class="text-sm text-gray-700 mt-4 text-right font-semibold"></div>
    <form id="chat-form" class="flex gap-2">
      <textarea id="user-input" rows="2" placeholder="Votre message..." class="flex-1 border rounded px-3 py-2 resize-none"></textarea>
      <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Envoyer</button>
    </form>
  </div>
  <script>
    // Elements
    const keyInput = document.getElementById('openai-key');
    const saveKeyBtn = document.getElementById('save-key');
    const modelSelect = document.getElementById('model-select');
    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');

    // Load key from localStorage
    function loadKey() {
      const key = localStorage.getItem('openai_key') || '';
      keyInput.value = key;
    }
    loadKey();

    // Save key to localStorage
    saveKeyBtn.addEventListener('click', () => {
      localStorage.setItem('openai_key', keyInput.value);
      alert('Clé OpenAI sauvegardée !');
    });

    // Add message to chat window
    function addMessage(role, content) {
      const msg = document.createElement('div');
      msg.className = role === 'user' ? 'text-right' : 'text-left';
      msg.innerHTML = `<span class=\"inline-block px-3 py-2 rounded ${role === 'user' ? 'bg-blue-100 text-blue-900' : 'bg-gray-200 text-gray-800'}\">${content}</span>`;
      chatWindow.appendChild(msg);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Gestion du cumul des coûts
    let totalTokens = 0;
    let totalDollars = 0;

    function showTotalCost() {
      const totalDiv = document.getElementById('total-cost-info');
      totalDiv.textContent = `Cumul : ${totalTokens} tokens ≈ $${totalDollars.toFixed(5)}`;
    }

    // Handle form submit
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const prompt = userInput.value.trim();
      if (!prompt) return;
      const key = keyInput.value.trim();
      if (!key) {
        alert('Veuillez entrer votre clé OpenAI.');
        return;
      }
      const model = modelSelect.value;
      addMessage('user', prompt);
      userInput.value = '';
      addMessage('assistant', '<span class="italic text-gray-400">Réponse en cours...</span>');
      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${key}`
          },
          body: JSON.stringify({
            model,
            messages: [
              { role: 'user', content: prompt }
            ]
          })
        });
        if (!response.ok) throw new Error('Erreur API');
        const data = await response.json();
        const answer = data.choices?.[0]?.message?.content || '[Aucune réponse]';
        // Estimation du coût
        let tokens = 0, dollars = 0;
        if (data.usage) {
          tokens = data.usage.total_tokens;
          // Barèmes fictifs, à adapter selon les prix OpenAI
          let pricePer1K = 0.01;
          if (model === 'gpt-4.1-nano') pricePer1K = 0.005;
          if (model === 'gpt-4.1-mini') pricePer1K = 0.008;
          if (model === 'gpt-3.5-turbo') pricePer1K = 0.001;
          dollars = (tokens / 1000 * pricePer1K);
        }
        totalTokens += tokens;
        totalDollars += Number(dollars);
        // Remove "Réponse en cours..."
        chatWindow.removeChild(chatWindow.lastChild);
        addMessage('assistant', answer + `<div class='text-xs text-gray-500 mt-1'>Coût : ${tokens} tokens ≈ $${Number(dollars).toFixed(5)}</div>`);
        // showCost supprimé
        showTotalCost();
      } catch (err) {
        chatWindow.removeChild(chatWindow.lastChild);
        addMessage('assistant', `<span class=\"text-red-500\">Erreur: ${err.message}</span>`);
        // showCost supprimé
      }
    });
  </script>
</body>
</html>
